name: Generate Snake

on:
workflow_dispatch:
schedule:
- cron: "0 0 * * *"

jobs:
generate:
runs-on: ubuntu-latest

```
permissions:
  contents: write

steps:
  - uses: Platane/snk@v3
    with:
      github_user_name: xFerL
      outputs: |
        dist/github-contribution-grid-snake-dark.svg

  - uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
